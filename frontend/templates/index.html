<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e27; color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 2rem; margin: 1rem 0; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .run-controls { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .run-controls input { flex: 1; margin: 0; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 0.75rem 2rem; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: transform 0.2s, opacity 0.2s; }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: default; transform: none; }
        button.secondary { background: rgba(255,255,255,0.1); }
        button.secondary:hover { background: rgba(255,255,255,0.2); transform: none; }
        input { width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; margin: 0.5rem 0; }
        .command-list { list-style: none; display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
        .command-list li { background: rgba(102,126,234,0.2); border: 1px solid rgba(102,126,234,0.4); border-radius: 6px; padding: 0.4rem 0.8rem; font-family: monospace; font-size: 0.9rem; cursor: pointer; transition: background 0.15s; }
        .command-list li:hover { background: rgba(102,126,234,0.4); }
        #output-wrapper { margin-top: 1rem; display: none; }
        #output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; font-size: 0.8rem; color: rgba(255,255,255,0.5); }
        #output { padding: 1rem; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: monospace; white-space: pre-wrap; min-height: 3rem; }
        .error { color: #ff6b6b; }
        .spinner { display: inline-block; width: 0.8rem; height: 0.8rem; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 0.4rem; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ project_name }}</h1>
        <div class="card">
            <h2>Available Commands</h2>
            <ul id="command-list" class="command-list">
                <li>loading...</li>
            </ul>
        </div>
        <div class="card">
            <h2>Run Command</h2>
            <div class="run-controls">
                <input type="text" id="cmd-input" placeholder="Enter a command (e.g. hello)" autocomplete="off" />
                <button id="run-btn">Run</button>
            </div>
            <div id="output-wrapper">
                <div id="output-header">
                    <span id="output-label">Output</span>
                    <button class="secondary" id="clear-btn" style="padding:0.3rem 0.8rem;font-size:0.8rem;">Clear</button>
                </div>
                <div id="output"></div>
            </div>
        </div>
    </div>
    <script>
        const runBtn = document.getElementById('run-btn');
        const clearBtn = document.getElementById('clear-btn');
        const cmdInput = document.getElementById('cmd-input');
        const outputWrapper = document.getElementById('output-wrapper');
        const outputEl = document.getElementById('output');
        const outputLabel = document.getElementById('output-label');

        async function loadCommands() {
            try {
                const res = await fetch('/commands');
                const data = await res.json();
                const list = document.getElementById('command-list');
                list.innerHTML = '';
                data.commands.forEach(function(c) {
                    const li = document.createElement('li');
                    li.textContent = c;
                    li.title = 'Click to fill';
                    li.addEventListener('click', function() {
                        cmdInput.value = c;
                        cmdInput.focus();
                    });
                    list.appendChild(li);
                });
            } catch (e) {
                const li = document.createElement('li');
                li.className = 'error';
                li.textContent = 'Failed to load';
                document.getElementById('command-list').replaceChildren(li);
            }
        }

        async function runCommand() {
            const cmd = cmdInput.value.trim();
            if (!cmd) return;
            outputWrapper.style.display = 'block';
            outputEl.className = '';
            outputEl.innerHTML = '<span class="spinner"></span>Running\u2026';
            outputLabel.textContent = 'Output \u2014 ' + cmd;
            runBtn.disabled = true;
            try {
                const res = await fetch('/run', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: cmd})
                });
                const data = await res.json();
                if (data.error) {
                    outputEl.className = 'error';
                    outputEl.textContent = data.error;
                } else {
                    outputEl.textContent = data.output || '(no output)';
                }
            } catch (e) {
                outputEl.className = 'error';
                outputEl.textContent = 'Request failed: ' + e.message;
            } finally {
                runBtn.disabled = false;
            }
        }

        runBtn.addEventListener('click', runCommand);
        clearBtn.addEventListener('click', function() {
            outputWrapper.style.display = 'none';
            outputEl.textContent = '';
        });
        cmdInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') runCommand();
        });

        loadCommands();
    </script>
</body>
</html>
