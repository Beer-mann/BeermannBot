<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e27; color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 2rem; margin: 1rem 0; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 0.75rem 2rem; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: default; transform: none; }
        input, textarea { width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; margin: 0.5rem 0; }
        .cmd-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
        .cmd-chip { background: rgba(102,126,234,0.2); border: 1px solid rgba(102,126,234,0.4); border-radius: 6px; padding: 0.4rem 0.9rem; cursor: pointer; transition: background 0.2s; }
        .cmd-chip:hover { background: rgba(102,126,234,0.4); }
        .cmd-empty { color: rgba(255,255,255,0.75); }
        .cmd-meta { margin-top: 0.75rem; color: rgba(255,255,255,0.8); min-height: 1.2rem; }
        #output { font-family: monospace; font-size: 0.95rem; min-height: 2.5rem; padding: 0.75rem; background: rgba(0,0,0,0.3); border-radius: 8px; margin-top: 1rem; white-space: pre-wrap; }
        .output-ok  { color: #a3e635; }
        .output-err { color: #f87171; }
        .form-row { display: flex; gap: 0.5rem; align-items: flex-start; }
        .form-row input { margin: 0; }
        .history-list { list-style: none; margin-top: 0.75rem; display: flex; flex-direction: column; gap: 0.4rem; }
        .history-item { display: flex; align-items: baseline; gap: 0.6rem; font-family: monospace; font-size: 0.9rem; }
        .history-cmd { font-weight: bold; }
        .history-ok { color: #a3e635; }
        .history-err { color: #f87171; }
        .history-time { color: rgba(255,255,255,0.45); font-size: 0.8rem; }
        .history-empty { color: rgba(255,255,255,0.5); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ project_name }}</h1>
        <div class="card">
            <h2>Available Commands</h2>
            <div class="cmd-list" id="cmd-list">Loading&hellip;</div>
            <div class="cmd-meta" id="cmd-meta">Pick a command to see its description.</div>
        </div>
        <div class="card">
            <h2>Run Command</h2>
            <div class="form-row">
                <input type="text" id="cmd-input" placeholder="Enter command (e.g. hello)" aria-label="Command input" />
                <button id="run-btn" onclick="runCommand()">Run</button>
            </div>
            <div id="output" role="status" aria-live="polite"></div>
        </div>
        <div class="card">
            <h2>History</h2>
            <ul class="history-list" id="history-list">
                <li class="history-empty">No commands run yet.</li>
            </ul>
        </div>
    </div>
    <script>
        let commandItems = [];

        function setCommandDescription(commandName) {
            const meta = document.getElementById('cmd-meta');
            const item = commandItems.find(entry => entry.name === commandName);
            meta.textContent = item ? item.description : 'Pick a command to see its description.';
        }

        function formatTimestamp(iso) {
            try {
                return new Date(iso).toLocaleTimeString();
            } catch (_) {
                return iso;
            }
        }

        function renderHistory(items) {
            const list = document.getElementById('history-list');
            if (!items || items.length === 0) {
                list.innerHTML = '<li class="history-empty">No commands run yet.</li>';
                return;
            }
            list.innerHTML = '';
            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                const statusClass = item.ok ? 'history-ok' : 'history-err';
                const statusIcon = item.ok ? '✓' : '✗';
                li.innerHTML =
                    '<span class="' + statusClass + '">' + statusIcon + '</span>' +
                    '<span class="history-cmd">' + escapeHtml(item.command) + '</span>' +
                    '<span class="history-time">' + formatTimestamp(item.timestamp) + '</span>';
                list.appendChild(li);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        async function loadCommands() {
            const list = document.getElementById('cmd-list');
            list.textContent = 'Loading...';
            try {
                const res = await fetch('/commands');
                if (!res.ok) {
                    throw new Error('Unable to load commands');
                }
                const data = await res.json();
                commandItems = data.items || [];
                list.innerHTML = '';
                if (data.commands.length === 0) {
                    list.innerHTML = '<span class="cmd-empty">No commands available.</span>';
                    return;
                }
                commandItems.forEach(item => {
                    const chip = document.createElement('span');
                    chip.className = 'cmd-chip';
                    chip.textContent = item.name;
                    chip.title = item.description;
                    chip.setAttribute('role', 'button');
                    chip.setAttribute('tabindex', '0');
                    chip.onclick = () => {
                        document.getElementById('cmd-input').value = item.name;
                        setCommandDescription(item.name);
                        runCommand();
                    };
                    chip.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') chip.click(); };
                    list.appendChild(chip);
                });
            } catch (e) {
                list.innerHTML = '<span class="cmd-empty">Failed to load commands.</span>';
            }
        }

        async function runCommand() {
            const input = document.getElementById('cmd-input');
            const btn = document.getElementById('run-btn');
            const out = document.getElementById('output');
            const cmd = input.value.trim();
            if (!cmd) {
                out.textContent = 'Enter a command before running.';
                out.className = 'output-err';
                return;
            }
            setCommandDescription(cmd);
            btn.disabled = true;
            out.textContent = 'Running\u2026';
            out.className = '';
            try {
                const res = await fetch('/run', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: cmd}),
                });
                const data = await res.json();
                out.textContent = data.output || '(no output)';
                out.className = data.ok ? 'output-ok' : 'output-err';
                if (data.history) {
                    renderHistory(data.history);
                }
            } catch (e) {
                out.textContent = 'Error: ' + e.message;
                out.className = 'output-err';
            } finally {
                btn.disabled = false;
            }
        }

        document.getElementById('cmd-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') runCommand();
        });

        loadCommands();
    </script>
</body>
</html>
