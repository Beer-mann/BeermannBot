<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e27; color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 2rem; margin: 1rem 0; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 0.75rem 2rem; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        input, textarea { width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; margin: 0.5rem 0; }
        .command-list { list-style: none; display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
        .command-list li { background: rgba(102,126,234,0.2); border: 1px solid rgba(102,126,234,0.4); border-radius: 6px; padding: 0.4rem 0.8rem; font-family: monospace; font-size: 0.9rem; }
        #output { margin-top: 1rem; padding: 1rem; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: monospace; white-space: pre-wrap; min-height: 3rem; display: none; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦅 {{ project_name }}</h1>
        <div class="card">
            <h2>Available Commands</h2>
            <ul id="command-list" class="command-list">
                <li>loading...</li>
            </ul>
        </div>
        <div class="card">
            <h2>Run Command</h2>
            <input type="text" id="cmd-input" placeholder="Enter a command (e.g. hello)" />
            <button onclick="runCommand()">Run</button>
            <div id="output"></div>
        </div>
    </div>
    <script>
        async function loadCommands() {
            try {
                const res = await fetch('/commands');
                const data = await res.json();
                const list = document.getElementById('command-list');
                list.innerHTML = data.commands.map(c => `<li>${c}</li>`).join('');
            } catch (e) {
                document.getElementById('command-list').innerHTML = '<li class="error">Failed to load</li>';
            }
        }

        async function runCommand() {
            const cmd = document.getElementById('cmd-input').value.trim();
            if (!cmd) return;
            const out = document.getElementById('output');
            out.style.display = 'block';
            out.className = '';
            out.textContent = 'Running...';
            try {
                const res = await fetch('/run', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: cmd})
                });
                const data = await res.json();
                if (data.error) {
                    out.className = 'error';
                    out.textContent = data.error;
                } else {
                    out.textContent = data.output;
                }
            } catch (e) {
                out.className = 'error';
                out.textContent = 'Request failed: ' + e.message;
            }
        }

        document.getElementById('cmd-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') runCommand();
        });

        loadCommands();
    </script>
</body>
</html>
